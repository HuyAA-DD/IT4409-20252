<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React CRUD</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 16px;
        }

        h1,
        h3,
        h4 {
            margin-bottom: 12px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 6px 0 12px 0;
        }

        button {
            padding: 8px 12px;
            margin-right: 8px;
            margin-top: 6px;
            cursor: pointer;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            margin-top: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th,
        td {
            border: 1px solid #999;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 16px;
        }

        .modal-content {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-row {
            margin-bottom: 10px;
        }

        .pagination {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .pagination button {
            margin: 0;
        }

        @media (max-width: 768px) {
            body {
                margin: 10px;
            }

            h1 {
                font-size: 24px;
            }

            .modal-content {
                padding: 16px;
                max-width: 100%;
            }

            button {
                width: 100%;
                margin-right: 0;
            }

            .pagination {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        function SearchForm({ onChangeValue }) {
            return (
                <div>
                    <h3>Tìm kiếm</h3>
                    <input
                        type="text"
                        placeholder="Tìm theo name, username"
                        onChange={(e) => onChangeValue(e.target.value)}
                    />
                </div>
            );
        }

        function AddUser({ onAdd }) {
            const initialUser = {
                name: "",
                username: "",
                email: "",
                address: {
                    street: "",
                    suite: "",
                    city: ""
                },
                phone: "",
                website: ""
            };

            const [adding, setAdding] = React.useState(false);
            const [user, setUser] = React.useState(initialUser);

            function handleChange(e) {
                const { id, value } = e.target;

                if (["street", "suite", "city"].includes(id)) {
                    setUser({
                        ...user,
                        address: {
                            ...user.address,
                            [id]: value
                        }
                    });
                } else {
                    setUser({
                        ...user,
                        [id]: value
                    });
                }
            }

            function handleAdd() {
                if (user.name.trim() === "" || user.username.trim() === "") {
                    alert("Vui lòng nhập Name và Username!");
                    return;
                }

                onAdd(user);
                setUser(initialUser);
                setAdding(false);
            }

            function handleCancel() {
                setUser(initialUser);
                setAdding(false);
            }

            return (
                <div>
                    <h3>Thêm người dùng</h3>
                    <button onClick={() => setAdding(true)}>Thêm</button>

                    {adding && (
                        <div className="modal-overlay" onClick={handleCancel}>
                            <div
                                className="modal-content"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <h4>Form thêm người dùng</h4>

                                <div className="form-row">
                                    <label htmlFor="name">Name: </label>
                                    <input
                                        id="name"
                                        type="text"
                                        value={user.name}
                                        onChange={handleChange}
                                    />
                                </div>

                                <div className="form-row">
                                    <label htmlFor="username">Username: </label>
                                    <input
                                        id="username"
                                        type="text"
                                        value={user.username}
                                        onChange={handleChange}
                                    />
                                </div>

                                <div className="form-row">
                                    <label htmlFor="email">Email: </label>
                                    <input
                                        id="email"
                                        type="text"
                                        value={user.email}
                                        onChange={handleChange}
                                    />
                                </div>

                                <div className="form-row">
                                    <label htmlFor="street">Street: </label>
                                    <input
                                        id="street"
                                        type="text"
                                        value={user.address.street}
                                        onChange={handleChange}
                                    />
                                </div>

                                <div className="form-row">
                                    <label htmlFor="suite">Suite: </label>
                                    <input
                                        id="suite"
                                        type="text"
                                        value={user.address.suite}
                                        onChange={handleChange}
                                    />
                                </div>

                                <div className="form-row">
                                    <label htmlFor="city">City: </label>
                                    <input
                                        id="city"
                                        type="text"
                                        value={user.address.city}
                                        onChange={handleChange}
                                    />
                                </div>

                                <div className="form-row">
                                    <label htmlFor="phone">Phone: </label>
                                    <input
                                        id="phone"
                                        type="text"
                                        value={user.phone}
                                        onChange={handleChange}
                                    />
                                </div>

                                <div className="form-row">
                                    <label htmlFor="website">Website: </label>
                                    <input
                                        id="website"
                                        type="text"
                                        value={user.website}
                                        onChange={handleChange}
                                    />
                                </div>

                                <button onClick={handleAdd}>Lưu người dùng mới</button>
                                <button onClick={handleCancel}>Hủy</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ResultTable({ keyword, user, onAdded }) {
            const [users, setUsers] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [editing, setEditing] = React.useState(null);
            const [currentPage, setCurrentPage] = React.useState(1);
            const [itemsPerPage, setItemsPerPage] = React.useState(5);

            React.useEffect(() => {
                fetch("https://jsonplaceholder.typicode.com/users")
                    .then((res) => res.json())
                    .then((data) => {
                        setUsers(data);
                        setLoading(false);
                    });
            }, []);

            React.useEffect(() => {
                if (user) {
                    setUsers((prev) => [
                        ...prev,
                        {
                            ...user,
                            id: Date.now(),
                            address: user.address || {
                                street: "",
                                suite: "",
                                city: ""
                            }
                        }
                    ]);
                    onAdded();
                }
            }, [user]);

            React.useEffect(() => {
                setCurrentPage(1);
            }, [itemsPerPage]);

            function removeUser(id) {
                setUsers((prev) => prev.filter((u) => u.id !== id));
            }

            function editUser(user) {
                setEditing({
                    ...user,
                    address: { ...user.address }
                });
            }

            function handleEditChange(field, value) {
                if (["street", "suite", "city"].includes(field)) {
                    setEditing((prev) => ({
                        ...prev,
                        address: {
                            ...prev.address,
                            [field]: value
                        }
                    }));
                } else {
                    setEditing((prev) => ({
                        ...prev,
                        [field]: value
                    }));
                }
            }

            function saveUser() {
                setUsers((prev) =>
                    prev.map((u) => (u.id === editing.id ? editing : u))
                );
                setEditing(null);
            }

            const filteredUsers = users.filter((u) =>
                u.name.toLowerCase().includes(keyword.toLowerCase()) ||
                u.username.toLowerCase().includes(keyword.toLowerCase())
            );

            const totalPages = Math.ceil(filteredUsers.length / itemsPerPage) || 1;

            React.useEffect(() => {
                if (currentPage > totalPages) {
                    setCurrentPage(totalPages);
                }
            }, [filteredUsers.length, totalPages, currentPage]);

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedUsers = filteredUsers.slice(startIndex, endIndex);

            function goToPrevPage() {
                if (currentPage > 1) {
                    setCurrentPage(currentPage - 1);
                }
            }

            function goToNextPage() {
                if (currentPage < totalPages) {
                    setCurrentPage(currentPage + 1);
                }
            }

            if (loading) {
                return <p>Đang tải dữ liệu...</p>;
            }

            return (
                <div>
                    <h3>Danh sách người dùng</h3>

                    <div className="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Họ tên</th>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Địa chỉ</th>
                                    <th>Số điện thoại</th>
                                    <th>Website</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                {paginatedUsers.map((u) => (
                                    <tr key={u.id}>
                                        <td>{u.id}</td>
                                        <td>{u.name}</td>
                                        <td>{u.username}</td>
                                        <td>{u.email}</td>
                                        <td>
                                            {u.address?.street}, {u.address?.suite}, {u.address?.city}
                                        </td>
                                        <td>{u.phone}</td>
                                        <td>{u.website}</td>
                                        <td>
                                            <button onClick={() => editUser(u)}>Sửa</button>
                                            <button onClick={() => removeUser(u.id)}>Xóa</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    <div style={{ marginBottom: "10px" }}>
                        <label>Số dòng mỗi trang: </label>
                        <select
                            value={itemsPerPage}
                            onChange={(e) => setItemsPerPage(Number(e.target.value))}
                        >
                            <option value={5}>5</option>
                            <option value={10}>10</option>
                            <option value={20}>20</option>
                        </select>
                    </div>

                    <div className="pagination">
                        <button onClick={goToPrevPage} disabled={currentPage === 1}>
                            Trang trước
                        </button>

                        <span>
                            Trang {currentPage} / {totalPages}
                        </span>

                        <button onClick={goToNextPage} disabled={currentPage === totalPages}>
                            Trang sau
                        </button>
                    </div>

                    {editing && (
                        <div
                            className="modal-overlay"
                            onClick={() => setEditing(null)}
                        >
                            <div
                                className="modal-content"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <h3>Sửa người dùng</h3>

                                <div className="form-row">
                                    <label>Name: </label>
                                    <input
                                        type="text"
                                        value={editing.name}
                                        onChange={(e) => handleEditChange("name", e.target.value)}
                                    />
                                </div>

                                <div className="form-row">
                                    <label>Username: </label>
                                    <input
                                        type="text"
                                        value={editing.username}
                                        onChange={(e) => handleEditChange("username", e.target.value)}
                                    />
                                </div>

                                <div className="form-row">
                                    <label>Email: </label>
                                    <input
                                        type="text"
                                        value={editing.email}
                                        onChange={(e) => handleEditChange("email", e.target.value)}
                                    />
                                </div>

                                <div className="form-row">
                                    <label>Street: </label>
                                    <input
                                        type="text"
                                        value={editing.address.street}
                                        onChange={(e) => handleEditChange("street", e.target.value)}
                                    />
                                </div>

                                <div className="form-row">
                                    <label>Suite: </label>
                                    <input
                                        type="text"
                                        value={editing.address.suite}
                                        onChange={(e) => handleEditChange("suite", e.target.value)}
                                    />
                                </div>

                                <div className="form-row">
                                    <label>City: </label>
                                    <input
                                        type="text"
                                        value={editing.address.city}
                                        onChange={(e) => handleEditChange("city", e.target.value)}
                                    />
                                </div>

                                <div className="form-row">
                                    <label>Phone: </label>
                                    <input
                                        type="text"
                                        value={editing.phone}
                                        onChange={(e) => handleEditChange("phone", e.target.value)}
                                    />
                                </div>

                                <div className="form-row">
                                    <label>Website: </label>
                                    <input
                                        type="text"
                                        value={editing.website}
                                        onChange={(e) => handleEditChange("website", e.target.value)}
                                    />
                                </div>

                                <button onClick={saveUser}>Lưu</button>
                                <button onClick={() => setEditing(null)}>Hủy</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [kw, setKeyword] = React.useState("");
            const [newUser, setNewUser] = React.useState(null);

            return (
                <div>
                    <h1>Quản lý người dùng</h1>
                    <SearchForm onChangeValue={setKeyword} />
                    <AddUser onAdd={setNewUser} />
                    <ResultTable
                        keyword={kw}
                        user={newUser}
                        onAdded={() => setNewUser(null)}
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
