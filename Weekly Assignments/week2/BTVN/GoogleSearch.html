<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Google</title>
</head>

<body>

    <header>
        <h1></h1>
        <nav style="text-align: right;">
            <a href="#" style="text-decoration: none;">Gmail</a> 
            <a href="#" style="text-decoration: none;">Images</a> 
            <a href="#" style="text-decoration: none;">lab</a>
        </nav>
    </header>

    <main>

        <section style="display:flex;flex-direction:column;align-items:center;margin-top:120px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/1280px-Google_2015_logo.svg.png"
                width="272" height="92">

            <div style="
                display:flex;
                align-items:center;
                width:100%;
                max-width:650px;
                height:44px;
                border-radius:24px;
                box-shadow:0 1px 6px rgba(32,33,36,0.28);
                padding:0 15px;
                margin-top:20px;
                background:white;
            ">

                <!-- Search icon -->
                <img src="https://img.icons8.com/material-outlined/24/search--v1.png" width="20">

                <input style="
                border:none;
                outline:none;
                font-size:16px;
                flex:1;
                margin-left:10px;
                "
                type="text"
                placeholder="Search Google or type a URL">

                <!-- Mic icon -->
                <img src="https://www.iconpacks.net/icons/1/free-microphone-icon-342-thumb.png" 
                width="20" style="margin-left:10px;">
                <!-- Camera -->
                <img src="https://assets.streamlinehq.com/image/private/w_300,h_300,ar_1/f_auto/v1/icons/technology/google-lens-vpaetmjfrusd3o9w34s58.png/google-lens-liznyqh2evl09fugnk212jl.png?_a=DATAiZAAZAA0" 
                width="20" style="margin-left:10px;">

                <button style="
                margin-left:12px;
                height:32px;
                padding:0 12px;
                border:none;
                border-radius:16px;
                background:#f1f3f4;
                cursor:pointer;
                font-size:14px;
                ">
                AI Mode
                </button>
            </div>

            <!-- add shortcut -->
            <div style="margin-top:40px;text-align:center;cursor:pointer;">
            <div style="
            width:50px;
            height:50px;
            border-radius:50%;
            background:#f1f3f4;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:28px;
            margin:auto;
            ">
            +
            </div>
            <div style="margin-top:8px;font-size:14px;color:#202124;">
                Add shortcut
            </div>
            </div>

        </section>

        <aside>
            <h3></h3>
            <p></p>
        </aside>

    </main>

    <footer>
        <p></p>
    </footer>

</body>

</html>
