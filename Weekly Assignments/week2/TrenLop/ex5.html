<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div>
        <input id="input" class="truncate" type="search" autocomplete="off" part="searchbox-input" spellcheck="false"
            role="combobox" aria-controls="matches" aria-live="polite" aria-expanded="false" aria-description=""
            placeholder="Search Google or type a URL">
    </div>

    <div class="searchbox-icon-button-container voice">
        <button id="voiceSearchButton" class="searchbox-icon-button" title="Search by voice">
        </button>
    </div>

    <div class="searchbox-icon-button-container lens">
        <button id="lensSearchButton" class="searchbox-icon-button lens" title="Search by image">
        </button>
    </div>

</body>

</html>
